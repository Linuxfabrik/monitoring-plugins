version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '05:00'
      timezone: 'Etc/UTC'

  # One entry per Python LTS lockfile. Each lockfile lives in its own
  # directory under `lockfiles/` so Dependabot can apply per-version
  # ignore rules (e.g. urllib3 cannot move past 2.6.x on Python 3.9).
  - package-ecosystem: 'pip'
    directory: '/lockfiles/py39'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '05:00'
      timezone: 'Etc/UTC'
    ignore:
      # urllib3 >= 2.7.0 requires Python 3.10+; the py39 lockfile is
      # for RHEL 8 / Debian 11 (Python 3.9) and must stay on 2.6.x.
      - dependency-name: 'urllib3'
        versions: ['>=2.7.0']

  - package-ecosystem: 'pip'
    directory: '/lockfiles/py310'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '05:00'
      timezone: 'Etc/UTC'

  - package-ecosystem: 'pip'
    directory: '/lockfiles/py311'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '05:00'
      timezone: 'Etc/UTC'

  - package-ecosystem: 'pip'
    directory: '/lockfiles/py312'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '05:00'
      timezone: 'Etc/UTC'

  - package-ecosystem: 'pip'
    directory: '/lockfiles/py313'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '05:00'
      timezone: 'Etc/UTC'

  - package-ecosystem: 'pip'
    directory: '/lockfiles/py314'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '05:00'
      timezone: 'Etc/UTC'

  - package-ecosystem: 'pip'
    directory: '/lockfiles/py313-windows'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '05:00'
      timezone: 'Etc/UTC'

  - package-ecosystem: 'pip'
    directory: '/.github/pre-commit'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '05:00'
      timezone: 'Etc/UTC'
