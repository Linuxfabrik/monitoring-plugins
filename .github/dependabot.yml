version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '05:00'
      timezone: 'Etc/UTC'

  - package-ecosystem: 'pip'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '05:00'
      timezone: 'Etc/UTC'

  - package-ecosystem: 'pip'
    directory: '/.github/pre-commit'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '05:00'
      timezone: 'Etc/UTC'
