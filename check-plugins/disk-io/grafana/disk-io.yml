apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
  folder: linuxfabrik-monitoring-plugins
  name: disk-io
spec:
  schemaVersion: 42
  tags:
    - Linuxfabrik
    - Grizzly
    - repeating
  time:
    from: now-90d
    to: now
  timepicker:
    hidden: false
    refresh_intervals:
    - 1m
  timezone: browser
  title: Disk I/O
  editable: true
  liveNow: true
  refresh: 1m
  templating:
    list:
    - label: Command
      name: command
      query: SHOW MEASUREMENTS WITH MEASUREMENT =~ /.*disk-io.*/
      current:
        text: cmd-check-disk-io
        value: cmd-check-disk-io
      refresh: 1
      sort: 1
      type: query
    - label: Hostname
      name: hostname
      query: SHOW TAG VALUES FROM "$command" WITH KEY = "hostname"
      refresh: 1
      sort: 1
      type: query
    - label: Service
      name: service
      query: SHOW TAG VALUES FROM "$command" WITH KEY = "service" WHERE hostname = '$hostname'
      refresh: 1
      sort: 1
      type: query
    - label: Metric
      name: metric
      query: SHOW TAG VALUES FROM "$command" WITH KEY = "metric" WHERE hostname = '$hostname'
      refresh: 1
      sort: 1
      type: query
      hide: 2
      includeAll: true
      multi: true
      # Capture the disk prefix only from per-disk labels like "dm-0_busy_time".
      # The global "iowait" label has no underscore, so it does not match and is
      # excluded from this per-disk repeat (it has its own dedicated panel).
      regex: /^([^_]+)_/

  panels:

  # iowait is a system-wide CPU statistic (from /proc/stat), not a per-disk
  # value, so it lives in its own non-repeated panel above the per-disk rows.
  - title: iowait
    type: row
    gridPos:
      h: 1
      w: 24
      x: 0
      y: 0


  - title: Disk I/O - iowait - Saturated Cores
    type: timeseries
    gridPos:
      h: 8
      w: 24
      x: 0
      y: 1
    fieldConfig:
      defaults:
        color:
          mode: palette-classic
        custom:
          drawStyle: line
          lineInterpolation: smooth
          lineWidth: 1
          pointSize: 3
          showPoints: always
          spanNulls: false
        decimals: 2
        mappings: []
        min: 0
        unit: short
    options:
      legend:
        calcs:
        - first
        - min
        - mean
        - max
        - last
        displayMode: table
        placement: bottom
        showLegend: true

    targets:

    - alias: iowait
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      refId: disk-io-iowait
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - key: metric
        operator: =~
        value: /^iowait/


  - title: $metric
    type: row
    gridPos:
      h: 1
      w: 24
      x: 0
      y: 9
    repeat: metric
    repeatDirection: h


  - title: Disk I/O - $metric - Bytes per Second
    type: timeseries
    gridPos:
      h: 8
      w: 12
      x: 0
      y: 10
    fieldConfig:
      defaults:
        color:
          mode: palette-classic
        custom:
          drawStyle: line
          lineInterpolation: smooth
          lineWidth: 1
          pointSize: 3
          showPoints: always
          spanNulls: false
        decimals: 1
        mappings: []
        min: 0
        unit: binBps
      overrides:
      - __systemRef: hideSeriesFrom
        matcher:
          id: byNames
          options:
            mode: exclude
            names:
            - throughput1
            prefix: 'All except:'
        properties:
        - id: custom.hideFrom
          value:
            viz: true
    options:
      legend:
        calcs:
        - first
        - min
        - mean
        - max
        - last
        displayMode: table
        placement: bottom
        showLegend: true

    targets:

    - alias: read_bytes_per_second1
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      refId: disk-io-read_bytes_per_second1
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - key: metric
        operator: =~
        value: /^${metric}_read_bytes_per_second1/

    - alias: read_bytes_per_second15
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      refId: disk-io-read_bytes_per_second15
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - key: metric
        operator: =~
        value: /^${metric}_read_bytes_per_second15/

    - alias: throughput1
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      refId: disk-io-throughput1
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - key: metric
        operator: =~
        value: /^${metric}_throughput1/

    - alias: throughput15
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      refId: disk-io-throughput15
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - key: metric
        operator: =~
        value: /^${metric}_throughput15/

    - alias: write_bytes_per_second1
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      refId: disk-io-write_bytes_per_second1
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - key: metric
        operator: =~
        value: /^${metric}_write_bytes_per_second1/

    - alias: write_bytes_per_second15
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      refId: disk-io-write_bytes_per_second15
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - key: metric
        operator: =~
        value: /^${metric}_write_bytes_per_second15/


  - title: Disk I/O - $metric - Busy
    type: timeseries
    gridPos:
      h: 8
      w: 12
      x: 12
      y: 10
    fieldConfig:
      defaults:
        color:
          mode: palette-classic
        custom:
          drawStyle: line
          lineInterpolation: smooth
          lineWidth: 1
          pointSize: 3
          showPoints: always
          spanNulls: false
        decimals: 1
        mappings: []
        max: 100
        min: 0
        unit: percent
    options:
      legend:
        calcs:
        - first
        - min
        - mean
        - max
        - last
        displayMode: table
        placement: bottom
        showLegend: true

    targets:

    - alias: busy_percent
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      refId: disk-io-busy_percent
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - key: metric
        operator: =~
        value: /^${metric}_busy_percent/

