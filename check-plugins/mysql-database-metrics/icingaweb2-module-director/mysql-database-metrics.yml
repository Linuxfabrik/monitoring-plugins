overwrites:
  '["ServiceTemplate"]["tpl-service-mysql-database-metrics"]["check_interval"]': 86400
  '["ServiceTemplate"]["tpl-service-mysql-database-metrics"]["enable_perfdata"]': false
  # Default to the per-schema breakdown table - admins activating the Schemas
  # Service Set typically want to see what mysqltuner --dbstat would print.
  '["ServiceTemplate"]["tpl-service-mysql-database-metrics"]["vars"]["mysql_database_metrics_lengthy"]': true
  # Skip the entire Icinga ecosystem schema family by default. Icinga Director,
  # Icinga Web 2 and Icinga DB ship schemas with mixed utf8/utf8mb4 collations
  # by design, which would otherwise generate a constant WARN every check run
  # (see CONTRIBUTING.md "alert on the actionable" stance).
  '["ServiceTemplate"]["tpl-service-mysql-database-metrics"]["vars"]["mysql_database_metrics_ignore_schemas"]': "^icinga"
