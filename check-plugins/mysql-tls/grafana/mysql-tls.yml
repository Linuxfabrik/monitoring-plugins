apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
  folder: linuxfabrik-monitoring-plugins
  name: mysql-tls
spec:
  schemaVersion: 42
  tags:
    - Linuxfabrik
    - Grizzly
    - static
  time:
    from: now-90d
    to: now
  timepicker:
    hidden: false
    refresh_intervals:
    - 1m
  timezone: browser
  title: MySQL TLS
  editable: true
  liveNow: true
  refresh: 1m
  templating:
    list:
    - label: Command
      name: command
      query: SHOW MEASUREMENTS WITH MEASUREMENT =~ /.*mysql-tls.*/
      current:
        text: cmd-check-mysql-tls
        value: cmd-check-mysql-tls
      refresh: 1
      sort: 1
      type: query
    - label: Hostname
      name: hostname
      query: SHOW TAG VALUES FROM "$command" WITH KEY = "hostname"
      refresh: 1
      sort: 1
      type: query
    - label: Service
      name: service
      query: SHOW TAG VALUES FROM "$command" WITH KEY = "service" WHERE hostname = '$hostname'
      refresh: 1
      sort: 1
      type: query

  panels:

  - title: MySQL TLS - Posture
    type: timeseries
    gridPos:
      h: 8
      w: 12
      x: 0
      y: 0
    fieldConfig:
      defaults:
        color:
          mode: palette-classic
        custom:
          drawStyle: line
          lineInterpolation: stepAfter
          lineWidth: 2
          pointSize: 3
          showPoints: always
          spanNulls: false
        decimals: 0
        max: 1
        min: 0
        unit: bool_on_off
      overrides:
      - matcher:
          id: byName
          options: mysql_tls_session_encrypted
        properties:
        - id: displayName
          value: monitoring connection encrypted
      - matcher:
          id: byName
          options: mysql_tls_have_ssl
        properties:
        - id: displayName
          value: have_ssl
      - matcher:
          id: byName
          options: mysql_tls_required
        properties:
        - id: displayName
          value: require_secure_transport
    options:
      legend:
        calcs:
        - first
        - min
        - mean
        - max
        - last
        displayMode: table
        placement: bottom
        showLegend: true
      tooltip:
        mode: multi
        sort: none

    targets:

    - alias: mysql_tls_session_encrypted
      refId: mysql_tls_session_encrypted
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - condition: AND
        key: metric
        operator: '='
        value: mysql_tls_session_encrypted

    - alias: mysql_tls_have_ssl
      refId: mysql_tls_have_ssl
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - condition: AND
        key: metric
        operator: '='
        value: mysql_tls_have_ssl

    - alias: mysql_tls_required
      refId: mysql_tls_required
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - condition: AND
        key: metric
        operator: '='
        value: mysql_tls_required

  - title: MySQL TLS - Protocol Versions Enabled
    type: timeseries
    gridPos:
      h: 8
      w: 12
      x: 12
      y: 0
    fieldConfig:
      defaults:
        color:
          mode: palette-classic
        custom:
          drawStyle: line
          lineInterpolation: stepAfter
          lineWidth: 2
          pointSize: 3
          showPoints: always
          spanNulls: false
        decimals: 0
        max: 2
        min: 0
        unit: short
      overrides:
      - matcher:
          id: byName
          options: mysql_tls_weak_protocol_versions
        properties:
        - id: displayName
          value: weak (TLSv1.0, TLSv1.1)
        - id: color
          value:
            mode: fixed
            fixedColor: red
      - matcher:
          id: byName
          options: mysql_tls_modern_protocol_versions
        properties:
        - id: displayName
          value: modern (TLSv1.2, TLSv1.3)
        - id: color
          value:
            mode: fixed
            fixedColor: green
    options:
      legend:
        calcs:
        - first
        - min
        - mean
        - max
        - last
        displayMode: table
        placement: bottom
        showLegend: true
      tooltip:
        mode: multi
        sort: none

    targets:

    - alias: mysql_tls_weak_protocol_versions
      refId: mysql_tls_weak_protocol_versions
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - condition: AND
        key: metric
        operator: '='
        value: mysql_tls_weak_protocol_versions

    - alias: mysql_tls_modern_protocol_versions
      refId: mysql_tls_modern_protocol_versions
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - condition: AND
        key: metric
        operator: '='
        value: mysql_tls_modern_protocol_versions

  - title: MySQL TLS - Certificate Days Until Expiry
    type: timeseries
    gridPos:
      h: 8
      w: 12
      x: 0
      y: 8
    fieldConfig:
      defaults:
        color:
          mode: palette-classic
        custom:
          drawStyle: line
          lineInterpolation: smooth
          lineWidth: 1
          pointSize: 3
          showPoints: always
          spanNulls: false
        decimals: 0
        min: 0
        unit: d
      overrides:
      - matcher:
          id: byName
          options: mysql_tls_ssl_cert_days_until_expiry
        properties:
        - id: displayName
          value: ssl_cert
      - matcher:
          id: byName
          options: mysql_tls_ssl_ca_days_until_expiry
        properties:
        - id: displayName
          value: ssl_ca
    options:
      legend:
        calcs:
        - first
        - min
        - mean
        - max
        - last
        displayMode: table
        placement: bottom
        showLegend: true
      tooltip:
        mode: multi
        sort: none

    targets:

    - alias: mysql_tls_ssl_cert_days_until_expiry
      refId: mysql_tls_ssl_cert_days_until_expiry
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - condition: AND
        key: metric
        operator: '='
        value: mysql_tls_ssl_cert_days_until_expiry

    - alias: mysql_tls_ssl_ca_days_until_expiry
      refId: mysql_tls_ssl_ca_days_until_expiry
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - condition: AND
        key: metric
        operator: '='
        value: mysql_tls_ssl_ca_days_until_expiry

  - title: MySQL TLS - Remote Users Without REQUIRE SSL
    type: timeseries
    gridPos:
      h: 8
      w: 12
      x: 12
      y: 8
    fieldConfig:
      defaults:
        color:
          mode: palette-classic
        custom:
          drawStyle: line
          lineInterpolation: stepAfter
          lineWidth: 2
          pointSize: 3
          showPoints: always
          spanNulls: false
        decimals: 0
        min: 0
        unit: short
      overrides:
      - matcher:
          id: byName
          options: mysql_tls_remote_users_without_ssl
        properties:
        - id: displayName
          value: remote users without REQUIRE SSL
    options:
      legend:
        calcs:
        - first
        - min
        - mean
        - max
        - last
        displayMode: table
        placement: bottom
        showLegend: true
      tooltip:
        mode: multi
        sort: none

    targets:

    - alias: mysql_tls_remote_users_without_ssl
      refId: mysql_tls_remote_users_without_ssl
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - condition: AND
        key: metric
        operator: '='
        value: mysql_tls_remote_users_without_ssl
