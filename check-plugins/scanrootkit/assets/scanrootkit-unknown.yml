# Source: https://rkhunter.sourceforge.net/ (rkhunter "general rootkit indicator" paths)
# Generic indicators that cannot be tied to a specific named rootkit. Includes the Romanian
# decoy path "unde vrei tu sa te ascunzi in server" ("where do you want to hide on the server"),
# rkhunter classics with embedded double-spaces meant to fool `ls`, and the X11R6 hidden font
# directory pattern. Confidence is low because the X11R6 paths in particular could in theory
# collide with real legacy installations.
name: 'Unknown rootkit (generic indicators)'
files: []
dirs:
  - '/unde/vrei/tu/sa/te/ascunzi/in/server'
  - '/usr/man/man1/..  /.dir'
  - '/usr/X11R6/include/X11/...'
  - '/usr/X11R6/lib/X11/.fonts/misc/...'
ksyms: []
cl: 50
