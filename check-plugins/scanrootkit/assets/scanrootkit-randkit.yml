# Source: https://github.com/fkie-cad/linux-rootkit-iocs/blob/main/ioc-table.md, https://doi.org/10.1145/3688808
# Published: 2024 Fraunhofer FKIE-CAD (academic LKM rootkit survey)
# Detection strategy: a loaded LKM is exposed as a directory under /sys/module/<modname>/.
# This catches the rootkit while it is loaded, even though the .ko file path on disk depends
# on the running kernel version and cannot be matched as a fixed path.
name: 'randkit LKM rootkit'
files: []
dirs:
  - '/sys/module/randkit_xor128'
  - '/sys/module/randkit_zero'
ksyms: []
discovered: '2024'
cl: 100
