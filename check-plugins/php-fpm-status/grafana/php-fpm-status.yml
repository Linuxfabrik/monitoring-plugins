  - title: PHP-FPM Status - Uptime ($pool)
    type: timeseries
    gridPos:
      h: 8
      w: 12
      x: 0
      y: 24
    fieldConfig:
      defaults:
        color:
          mode: palette-classic
        custom:
          lineInterpolation: smooth
          spanNulls: false
        decimals: 0
        min: 0
        unit: s
    options:
      legend:
        calcs:
        - first
        - min
        - mean
        - max
        - last
        displayMode: table
        placement: bottom
        showLegend: true
      tooltip:
