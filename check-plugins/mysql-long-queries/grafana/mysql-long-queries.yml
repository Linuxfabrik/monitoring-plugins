apiVersion: grizzly.grafana.com/v1alpha1
kind: Dashboard
metadata:
  folder: linuxfabrik-monitoring-plugins
  name: mysql-long-queries
spec:
  schemaVersion: 42
  tags:
    - Linuxfabrik
    - Grizzly
    - static
  time:
    from: now-90d
    to: now
  timepicker:
    hidden: false
    refresh_intervals:
    - 1m
  timezone: browser
  title: MySQL Long Queries
  editable: true
  liveNow: true
  refresh: 1m
  templating:
    list:
    - label: Command
      name: command
      query: SHOW MEASUREMENTS WITH MEASUREMENT =~ /.*mysql-long-queries.*/
      current:
        text: cmd-check-mysql-long-queries
        value: cmd-check-mysql-long-queries
      refresh: 1
      sort: 1
      type: query
    - label: Hostname
      name: hostname
      query: SHOW TAG VALUES FROM "$command" WITH KEY = "hostname"
      refresh: 1
      sort: 1
      type: query
    - label: Service
      name: service
      query: SHOW TAG VALUES FROM "$command" WITH KEY = "service" WHERE hostname = '$hostname'
      refresh: 1
      sort: 1
      type: query

  panels:

  - title: MySQL Long Queries - Max Runtime
    type: timeseries
    gridPos:
      h: 8
      w: 12
      x: 0
      y: 0
    fieldConfig:
      defaults:
        color:
          mode: palette-classic
        custom:
          drawStyle: line
          lineInterpolation: stepAfter
          lineWidth: 2
          pointSize: 3
          showPoints: always
          spanNulls: false
        decimals: 0
        min: 0
        unit: s
      overrides:
      - matcher:
          id: byName
          options: mysql_long_queries_max_runtime_seconds
        properties:
        - id: displayName
          value: longest in-flight query runtime
    options:
      legend:
        calcs:
        - first
        - min
        - mean
        - max
        - last
        displayMode: table
        placement: bottom
        showLegend: true
      tooltip:
        mode: multi
        sort: none

    targets:

    - alias: mysql_long_queries_max_runtime_seconds
      refId: mysql_long_queries_max_runtime_seconds
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - condition: AND
        key: metric
        operator: '='
        value: mysql_long_queries_max_runtime_seconds

  - title: MySQL Long Queries - In-Flight Counts
    type: timeseries
    gridPos:
      h: 8
      w: 12
      x: 12
      y: 0
    fieldConfig:
      defaults:
        color:
          mode: palette-classic
        custom:
          drawStyle: line
          lineInterpolation: stepAfter
          lineWidth: 2
          pointSize: 3
          showPoints: always
          spanNulls: false
        decimals: 0
        min: 0
        unit: short
      overrides:
      - matcher:
          id: byName
          options: mysql_long_queries_total
        properties:
        - id: displayName
          value: total in-flight queries
      - matcher:
          id: byName
          options: mysql_long_queries_over_warn
        properties:
        - id: displayName
          value: over warning threshold
        - id: color
          value:
            mode: fixed
            fixedColor: red
    options:
      legend:
        calcs:
        - first
        - min
        - mean
        - max
        - last
        displayMode: table
        placement: bottom
        showLegend: true
      tooltip:
        mode: multi
        sort: none

    targets:

    - alias: mysql_long_queries_total
      refId: mysql_long_queries_total
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - condition: AND
        key: metric
        operator: '='
        value: mysql_long_queries_total

    - alias: mysql_long_queries_over_warn
      refId: mysql_long_queries_over_warn
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - condition: AND
        key: metric
        operator: '='
        value: mysql_long_queries_over_warn

  - title: MySQL Long Queries - Current Over-Warn Count
    type: stat
    gridPos:
      h: 6
      w: 24
      x: 0
      y: 8
    fieldConfig:
      defaults:
        color:
          mode: thresholds
        decimals: 0
        min: 0
        unit: short
        thresholds:
          mode: absolute
          steps:
          - color: green
            value: null
          - color: red
            value: 1
    options:
      colorMode: background
      graphMode: area
      justifyMode: auto
      orientation: auto
      reduceOptions:
        calcs:
        - lastNotNull
        fields: ''
        values: false
      textMode: auto

    targets:

    - alias: mysql_long_queries_over_warn
      refId: mysql_long_queries_over_warn
      groupBy:
      - params:
        - $interval
        type: time
      - params:
        - previous
        type: fill
      measurement: $command
      resultFormat: time_series
      select:
      - - params:
          - value
          type: field
        - params: []
          type: mean
      tags:
      - key: hostname
        operator: '='
        value: $hostname
      - condition: AND
        key: service
        operator: '='
        value: $service
      - condition: AND
        key: metric
        operator: '='
        value: mysql_long_queries_over_warn
